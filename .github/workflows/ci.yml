name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Pest (PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '11'
            illuminate: '^11.0'
            testbench: '^9.0'
            pest: '^3.0'
            pest-laravel: '^3.0'
          - php: '8.3'
            laravel: '12'
            illuminate: '^12.0'
            testbench: '^10.0'
            pest: '^3.0'
            pest-laravel: '^3.0'
          - php: '8.4'
            laravel: '13'
            illuminate: '^13.0'
            testbench: '^11.0'
            pest: '^4.0'
            pest-laravel: '^4.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Select Laravel dependency line
        run: >
          composer require
          "illuminate/console:${{ matrix.illuminate }}"
          "illuminate/contracts:${{ matrix.illuminate }}"
          "illuminate/support:${{ matrix.illuminate }}"
          "orchestra/testbench:${{ matrix.testbench }}"
          "pestphp/pest:${{ matrix.pest }}"
          "pestphp/pest-plugin-laravel:${{ matrix.pest-laravel }}"
          --no-interaction
          --no-update

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress --with-all-dependencies

      - name: Run tests
        run: composer test

  quality:
    name: Static Analysis and Style
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check formatting
        run: composer format:check

      - name: Run static analysis
        run: composer analyse
